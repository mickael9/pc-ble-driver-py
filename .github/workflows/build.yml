name: Build pc-ble-driver-py
on:
  pull_request:
  push:
    branches:
      - *
    tags:
      - v*
env:
  NRF_BLE_DRIVER_VERSION: 4.1.100
jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-20.04, macos-14, windows-2019 ]
        python-version: [ '3.11' ]
        include:
          - python-version: '3.11'
            toxpy: py311
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout pc-ble-driver
      run: |
        git clone https://github.com/NordicSemiconductor/pc-ble-driver.git
        cd pc-ble-driver
        git checkout c0ffd419053e2405fffdb02ce7f1f9acceff4a66


    - name: Build wheels
      uses: pypa/cibuildwheel@v2.17.0
      with:
        output-dir: dist

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pc_ble_driver_py-${{ matrix.os }}-${{ matrix.toxpy}}
        path: "dist/*.whl"
        if-no-files-found: error
  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    name: upload release assets
    runs-on: ubuntu-latest
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: flatten folder structure
        working-directory: dist
        run: |
          find . -name '*.whl' -exec mv {} . \;
          find . -type d -empty -delete

          # list files
          ls -R

      - name: upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
